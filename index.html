<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
       

    </style>
</head>
<body class="relative bg-pink-200 " >
  

   <div class="w-80 h-80 bg-pink-600 rounded-lg shadow-xl absolute top-80 left-5    md:w-110 md:h-110 md:top-70 md:left-10 lg:w-130 lg:h-130 lg:top-55 ">
    <p class=" font-bold text-2xl font-serif  absolute left-28 top-10 md:text-3xl md:left-36 md:left-40 md:top-15 lg:left-44 lg:text-5xl  lg:top-25">TO-DO</p>
    <input id="input" type="text" class="w-76 h-11 bg-pink-200 rounded-md border-2 absolute top-30 left-2 md:w-105 md:h-15 md:top-40  lg:w-126 lg:h-18 lg:top-55  " placeholder="Type your activities....">
    <button id="button" class="w-76 h-13 bg-pink-400 rounded-lg border-2 absolute top-45 left-2 font-serif text-2xl md:w-105 md:h-16 md:top-60 lg:w-126 lg:h-20 lg:top-80 " onclick="addtask()">Add</button>
   </div>
    
   <div class="w-90 h-100 bg-rose-300 rounded-lg shadow-xl absolute top-70 left-90  md:w-110 md:h-130 md:top-60 md:left-130  lg:left-160 lg:w-140 lg:h-160 lg:top-40">
    <ul id="task" class="flex flex-col gap-2"></ul>
   </div>
    
      <script>
        function addtask()
        {
            
            let input =document.getElementById("input");
            let x=input.value;

            let y = document.createElement("li");
           
            let u=document.getElementById("task");
            u.appendChild(y);

            if(input.value.trim()==="")
        {
            return;
        }
            input.value="";
            
            

            let div=document.createElement("div");
            div.classList.add("bg-gray-400","h-20","w-90","rounded-sm","font-serif","text-2xl","shadow-md","flex","items-center","gap-2","md:w-110","lg:w-140");
            u.appendChild(div);
            



            let text=document.createElement("span");
            text.textContent=x;

            let box=document.createElement("input");
            div.appendChild(box);
            div.appendChild(text);
            box.classList.add("w-10","h-10","flex","items-center","gap-3","px-3");
            box.type="checkbox";
            
            let edit=document.createElement("button");
            edit.innerHTML='<i class="fas fa-edit"></i>';
            edit.classList.add("ml-auto","items-center","px-1");
            div.appendChild(edit);

            let cross=document.createElement("button");
            cross.innerHTML='<i class="fa fa-times"></i>';

            cross.classList.add("px-3");
            div.appendChild(cross);
            

            box.addEventListener('change',function(){
                if( box.checked){
                    text.classList.add("line-through");
                }
                else{
                    text.classList.remove("line-through");
                }
                
            });
            

            
            cross.addEventListener('click',function(){
      
                div.remove();  
          
            }) 

                let inputBox=document.createElement("input");
                
                edit.addEventListener('click',function(){
                    if(inputBox==true){
                        
                    }
                inputBox.value=text.textContent;
                
                inputBox.classList.add("h-10","w-90","bg-gray-300","border-2","rounded-md");
                div.appendChild(inputBox);
                div.replaceChild(inputBox,text);
                inputBox.focus();

                 
                inputBox.addEventListener("keydown",function(event){
                    if(event.key=="Enter")
                    {
                        
                        text.textContent=inputBox.value;
                        div.replaceChild(text,inputBox);
                        
                    }
                });
                
             
                

            });
            
        }
    </script>
</body>
</html>
